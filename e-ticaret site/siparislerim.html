<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Siparişlerim | FLO</title>
<link rel="shortcut icon" href="images/flo-logo.svg">
<link href="css/eticaret.css" type="text/css" rel="stylesheet"/>
<link href="css/common.css" type="text/css" rel="stylesheet"/>
<style>
.sip-container { max-width: 1100px; margin: 30px auto; padding: 0 20px; font-family: Roboto, sans-serif; }
.sip-title { color: #333; font-size: 24px; margin-bottom: 25px; }
.sip-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 25px; margin-bottom: 20px; transition: box-shadow 0.2s; }
.sip-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.sip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
.sip-id { font-size: 18px; font-weight: 700; color: #333; }
.sip-date { font-size: 13px; color: #888; }
.sip-status { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.status-beklemede { background: #f5f5f5; color: #666; }
.status-hazirlaniyor { background: #fff3e0; color: #e65100; }
.status-kargoda { background: #e3f2fd; color: #1565c0; }
.status-teslim { background: #e8f5e9; color: #2e7d32; }
.status-iptal { background: #ffebee; color: #c62828; }
.sip-items { display: flex; flex-wrap: wrap; gap: 15px; }
.sip-item { display: flex; gap: 12px; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; flex: 1; min-width: 250px; }
.sip-item img { width: 50px; height: 65px; object-fit: cover; border-radius: 6px; }
.sip-item-name { font-size: 13px; color: #333; }
.sip-item-detail { font-size: 11px; color: #888; margin-top: 3px; }
.sip-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f0f0f0; }
.sip-total { font-size: 20px; font-weight: 700; color: #ff6600; }
.sip-address { font-size: 13px; color: #888; }
.empty-orders { text-align: center; padding: 80px 20px; }
.empty-orders h2 { color: #333; margin-bottom: 10px; }
.empty-orders p { color: #888; margin-bottom: 20px; }
.shop-btn { display: inline-block; padding: 14px 30px; background: linear-gradient(135deg, #ff6600, #ff8533); color: #fff; text-decoration: none; border-radius: 10px; font-weight: 700; transition: transform 0.2s; }
.shop-btn:hover { transform: translateY(-2px); }
.back-btn { display: inline-block; padding: 10px 20px; color: #ff6600; border: 1px solid #ff6600; border-radius: 8px; text-decoration: none; margin-top: 10px; transition: background 0.2s; }
.back-btn:hover { background: #fff5ee; }
</style>
</head>
<body>
<div>
	<div class="banner_ana">
	<div class="banner_div_ust">
   	  <div class="govde">
	    <a href="/"><div class="banner_logo"><img src="images/flo-logo.svg" height="44px" width="135px"/></div></a>
		  <a href="/kadin.html"><div class="icon1">Kadın</div></a>
		  <a href="/erkek.html"><div class="icon2">Erkek</div></a>
		  <a href="/cocuk.html"><div class="icon3">Çocuk</div></a>
        <div class="arama_govde">
		  <div class="arama_buton"><img src="images/arama_iconu.png" width="20" height="20"></div>
		  <div class="arama_text"><input type="text" name="arama" class="arama_text_nesne" placeholder="Aradığınız Ürün, Marka veya Kategoriyi Yazınız"/></div>	
		</div>
        <a href="/sepet"><div class="icon5"><img src="images/sepetim.png"></div></a>
      </div>
    </div>
</div>
	<div class="hizalama_bitir"></div>

<div class="sip-container">
    <h2 class="sip-title">📦 Siparişlerim</h2>

    
        
        <div class="sip-card">
            <div class="sip-header">
                <div>
                    <div class="sip-id">Sipariş #</div>
                    <div class="sip-date"></div>
                </div>
                <span class="sip-status 
                    status-beklemede
                    status-hazirlaniyor
                    status-kargoda
                    status-teslim
                    status-iptal
                    "></span>
            </div>
            
            <div class="sip-items">
                
                <div class="sip-item">
                    <img src="" alt="">
                    <div>
                        <div class="sip-item-name"></div>
                        <div class="sip-item-detail">Beden:  · Adet:  ·  TL</div>
                    </div>
                </div>
                
            </div>

            <div class="sip-footer">
                <div class="sip-address">📍 </div>
                <div class="sip-total"> TL</div>
            </div>
        </div>
        
    
        <div class="empty-orders">
            <h2>Henüz siparişiniz bulunmuyor</h2>
            <p>İlk siparişinizi vermek için alışverişe başlayın!</p>
            <a href="/" class="shop-btn">ALIŞVERİŞE BAŞLA</a>
        </div>
    

    <div style="text-align:center;margin:20px 0;">
        <a href="/hesabim" class="back-btn">← Hesabıma Dön</a>
    </div>
</div>

<div class="bos_div"></div>
</div>
<script src="js/db.js"></script>
</body>
</html>
